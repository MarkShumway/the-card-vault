<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <!-- Vault body -->
    <rect width="32" height="32" rx="4" fill="#1a2a2a"/>
    <rect width="32" height="32" rx="4" fill="none" stroke="#00c9a7" stroke-width="2"/>
    <!-- Outer ring -->
    <circle cx="16" cy="16" r="11" fill="none" stroke="#00c9a7" stroke-width="1.5"/>
    <!-- Inner ring -->
    <circle cx="16" cy="16" r="7" fill="#0d1a1a" stroke="#e8e8e8" stroke-width="1"/>
    <!-- Cardinal spokes -->
    <line x1="16" y1="5" x2="16" y2="9" stroke="#00c9a7" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="23" x2="16" y2="27" stroke="#00c9a7" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="16" x2="9" y2="16" stroke="#00c9a7" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="23" y1="16" x2="27" y2="16" stroke="#00c9a7" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Center dial -->
    <circle cx="16" cy="16" r="3.5" fill="#00c9a7"/>
    <circle cx="16" cy="16" r="1.8" fill="#e8e8e8"/>
    <!-- Hinge bolts -->
    <rect x="28" y="8" width="3" height="5" rx="1.5" fill="#e8e8e8"/>
    <rect x="28" y="19" width="3" height="5" rx="1.5" fill="#e8e8e8"/>
</svg>
